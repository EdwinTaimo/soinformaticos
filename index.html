<body>

    <div class="container">
        <div class="header">
            <h1>INFORMATICA 2 ANO</h1>
            <p class="subtitle">Bem-vindo ao servidor de confirmacoes de aula.</p>
        </div>
        
        <table id="tabela-aulas">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Cadeira</th>
                    <th>Docente</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
  </table>
  
 <div class="header-actions" style="justify-content: center; margin-top: 30px; flex-direction: column;">
    <button id="btn-refresh" onclick="refreshData()">
        <span id="icon-sync">🔄</span> Atualizar Status
    </button>
    <span id="last-update" style="margin-top: 10px;">Atualizado agora</span>       
 </div>


        

    
   <script>
    const urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5bbbsZ3ZyyocRFjl0KRS0i7vxq8TOWpTDd3ijBTVo5kZOwkDI_GI6rfOSMPOWbkkn1U_GVbgpf95O/pub?output=csv";

    async function carregarDados() {
        try {
            const resposta = await fetch(urlPlanilha + "&t=" + new Date().getTime());
            const dados = await resposta.text();
            localStorage.setItem('backup_aulas', dados);
            localStorage.setItem('backup_time', new Date().toLocaleTimeString());
            renderizarTabela(dados);
        } catch (erro) {
            const backup = localStorage.getItem('backup_aulas');
            if(backup) renderizarTabela(backup);
        }
    }

    function renderizarTabela(dados) {
        const linhas = dados.split(/\r?\n/).filter(l => l.trim() !== "").slice(1);
        const corpoTabela = document.querySelector("#tabela-aulas tbody");
        corpoTabela.innerHTML = ""; 

        // LÓGICA DE DATA AUTOMÁTICA
        const hoje = new Date();
        const diaSemanaAtual = hoje.getDay(); 
        let segundaRef = new Date(hoje);
        
        // Se for Sáb(6) ou Dom(0), aponta para a próxima segunda
        if (diaSemanaAtual === 0 || diaSemanaAtual === 6) {
            segundaRef.setDate(hoje.getDate() + (diaSemanaAtual === 0 ? 1 : 2));
        } else {
            segundaRef.setDate(hoje.getDate() - (diaSemanaAtual - 1));
        }

        const mapaDias = { 0:0, 1:0, 2:1, 3:1, 4:2, 5:3, 6:4 };
        const nomesDias = ["Segunda", "Terça", "Quarta", "Quinta", "Sexta"];

        linhas.forEach((linha, index) => {
            const colunas = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if(colunas.length >= 4 && colunas[1] && mapaDias[index] !== undefined) {
                const dataCadeira = new Date(segundaRef);
                dataCadeira.setDate(segundaRef.getDate() + mapaDias[index]);
                
                const diaMes = dataCadeira.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit' });
                const isChecked = colunas[3].trim().toUpperCase() === "TRUE";

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td style="font-size: 11px; color: #8e9297;">
                        ${nomesDias[mapaDias[index]]}<br><b style="color: #dcddde;">${diaMes}</b>
                    </td>
                    <td><strong>${colunas[1].replace(/"/g, "")}</strong></td>
                    <td class="col-docente">${colunas[2] || "---"}</td>
                    <td><span class="status-badge ${isChecked ? 'confirmada' : 'por-confirmar'}">
                        ${isChecked ? 'Confirmada' : 'Pendente'}
                    </span></td>
                `;
                corpoTabela.appendChild(tr);
            }
        });
    }

    carregarDados();
    setInterval(carregarDados, 30000);

            function updateTimestamp() {
    const agora = new Date();
    const hora = agora.getHours().toString().padStart(2, '0');
    const min = agora.getMinutes().toString().padStart(2, '0');
    document.getElementById('last-update').innerText = `Última verificação: ${hora}:${min}`;
}

let estadoAnterior = localStorage.getItem('backup_aulas');

function verificarMudancas(dadosNovos) {
    if (estadoAnterior && estadoAnterior !== dadosNovos) {
        // Se os dados mudaram, enviamos a notificação
        new Notification("Aulas 2º ANO | ET", {
            body: "Houve uma atualização nos status das aulas!",
            icon: "assets/icon.png" // Opcional: teu ícone
        });
    }
    estadoAnterior = dadosNovos;
}

// Chamar o timestamp na primeira carga
window.onload = updateTimestamp;

if ("Notification" in window) {
    Notification.requestPermission().then(permission => {
        if (permission === "granted") {
            console.log("Notificações autorizadas pelo utilizador.");
        }
    });
}
  
       
</script>
