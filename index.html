        function updateTimestamp() {
    const agora = new Date();
    const hora = agora.getHours().toString().padStart(2, '0');
    const min = agora.getMinutes().toString().padStart(2, '0');
    document.getElementById('last-update').innerText = `Última verificação: ${hora}:${min}`;
}

async function refreshData() {
    const btn = document.getElementById('btn-refresh');
    const icon = document.getElementById('icon-sync');
    
    // Inicia animação e desativa botão
    btn.disabled = true;
    icon.classList.add('spinning');
    btn.style.opacity = "0.7";

    await carregarDados(); // Chama a tua função que já existe
    
    // Para animação após 1 segundo (para dar feedback visual)
    setTimeout(() => {
        icon.classList.remove('spinning');
        btn.disabled = false;
        btn.style.opacity = "1";
        updateTimestamp();
    }, 800);
}

// Chamar o timestamp na primeira carga
window.onload = updateTimestamp;


        
    </script>

    <meta charset="UTF-8">
    <title>Avisos de Aulas | Discord Theme</title> 
    
    
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>INFORMATICA 2 ANO</h1>
            <p class="subtitle">Bem-vindo ao servidor de confirmacoes de aula.</p>
        </div>
        
        <table id="tabela-aulas">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Cadeira</th>
                    <th>Docente</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <div class="header-actions">
    <button id="btn-refresh" onclick="refreshData()">
        <span id="icon-sync">🔄</span> Atualizar Status
    </button>
    <span id="last-update">Atualizado agora</span>
</div>

    
    <script>
        // Substitui pelo teu link CSV real
        const urlPlanilha = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5bbbsZ3ZyyocRFjl0KRS0i7vxq8TOWpTDd3ijBTVo5kZOwkDI_GI6rfOSMPOWbkkn1U_GVbgpf95O/pub?output=csv";

        async function carregarDados() {
            try {
                const resposta = await fetch(urlPlanilha);
                const dados = await resposta.text();
                const linhas = dados.split("\n").slice(1); 
                const corpoTabela = document.querySelector("#tabela-aulas tbody");
                corpoTabela.innerHTML = ""; 

                linhas.forEach(linha => {
                    const colunas = linha.split(",");
                    if(colunas.length >= 4 && colunas[1].trim() !== "") {
                        const tr = document.createElement("tr");
                        
                        // Lógica da Checkbox baseada na tua planilha (Coluna D)
                        const isChecked = colunas[3].trim().toUpperCase() === "TRUE";
                        
                        const textoStatus = isChecked ? "Confirmada" : "Por Confirmar";
                        const classeStatus = isChecked ? "confirmada" : "por-confirmar";

                        tr.innerHTML = `
                            <td>${colunas[0]}</td>
                            <td><strong>${colunas[1]}</strong></td>
                            <td>${colunas[2]}</td>
                            <td><span class="status-badge ${classeStatus}">${textoStatus}</span></td>
                        `;
                        corpoTabela.appendChild(tr);
                    }
                });
            } catch (erro) {
                console.error("Erro no fetch:", erro);
            }
        }

        carregarDados();
        setInterval(carregarDados, 15000); // Atualiza a cada 15 sec
    </script>
</body>
