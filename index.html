<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informatica 2º Ano - UniLicungo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="gh-header">
        <div class="header-container">
            <span class="gh-logo">
                <img src="assets/icon.png" alt="Logo Só Informáticos" height="32" width="32">
            </span>
            <span class="repo-name">Info2Ano / <strong>aulas</strong></span>
            
            <div class="gh-controls">
                <button class="gh-btn btn-refresh" id="btn-refresh" onclick="carregarDados()">🔄 Sync</button>
                <div class="theme-dropdown">
                    <button class="gh-btn">🎨 Tema</button>
                    <div class="theme-content">
                        <a href="#" onclick="setTheme('light')">Light Default</a>
                        <a href="#" onclick="setTheme('dark')">Dark Dimmed</a>
                        <a href="#" onclick="setTheme('hacker')">Hacker Pro</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="gh-main">
        <div class="container">
            <div class="gh-card table-card">
                <div class="card-header">
                    <h3>Quadro de Aulas</h3>
                    <span class="branch-tag">main</span>
                </div>
                <table id="tabela-aulas" class="gh-table">
                    <thead>
                        <tr>
                            <th>Dia</th>
                            <th>Cadeira</th>
                            <th class="col-docente">Docente</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="skeleton-row"><td><div></div></td><td><div></div></td><td><div></div></td><td><div></div></td></tr>
                        <tr class="skeleton-row"><td><div></div></td><td><div></div></td><td><div></div></td><td><div></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="gh-fab-container">
        <a href="javascript:void(0)" onclick="mostrarCafe()" class="gh-fab btn-cafe">☕</a>
        <a href="tel:+258847243782" class="gh-fab btn-adjunta">📞Ligar a Adjunta</a>
        <a href="tel:+258833973761" class="gh-fab btn-chefe">📞 Ligar ao chefe</a>
    </div>

    <div id="overlay-cafe" class="overlay glass-overlay" onclick="fecharCafe()"></div>
    <div id="modal-cafe" class="gh-modal liquid-glass">
        <div class="modal-header">
            <h3>Apoie o Dev para manter o servidor no ar</h3>
            <button class="close-btn" onclick="fecharCafe()">×</button>
        </div>
        <p>M-kesh: <strong>833973761</strong></p>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
